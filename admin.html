<!DOCTYPE html>
<html>

<head>
    <title>Admin</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1 class="admin-title">Website bearbeiten</h1>

<div class="top-bar">

    <button class="logout" onclick="logout()">
        Abmelden
    </button>

</div>

<div class="admin-card">

    <h2>Neuen Block hinzufügen</h2>

    <input id="blockTitle" placeholder="Überschrift">

    <input id="position" placeholder="Position">

    <br><br>

    <textarea id="blockText" placeholder="Text"></textarea>

    <br><br>

    <input type="file" id="imageFile" accept="image/*" hidden>

    <label for="imageFile" class="file-button">
        Bild auswählen
    </label>

    <button type="button" class="image-delete" onclick="removeNewImage()">
        Bild löschen
    </button>

    <span id="selectedFile">
        Keine Datei ausgewählt
    </span>

    <br><br>

    <button class="add" onclick="addBlock()">
        Block hinzufügen
    </button>

</div>

<h2 class="admin-subtitle">Vorhandene Blöcke</h2>
    
<div id="blocks">
    Lade...
</div>

<script>

if(sessionStorage.getItem("admin") !== "true"){

    window.location.href = "index.html";

}

</script>
    
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>
<script src="admin.js"></script>

</body>

</html>
